  * { box-sizing: border-box; margin: 0; padding: 0; }

  .sum-card .lbl { font-size: 12px; color: #6E6E73; margin-top: 2px; }
  .sum-card.alert .num { color: #FF3B30; }
  .sum-card.warn .num { color: #FF9500; }
  .sum-card.good .num { color: #34C759; }

  .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input { width: 100%; padding: 8px 12px 8px 34px; border: 0.5px solid #D2D2D7; border-radius: 8px; font-size: 14px; background: white; color: #1D1D1F; font-family: inherit; }

  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #6E6E73; font-size: 14px; pointer-events: none; }
  .filter-chip { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 20px; border: 0.5px solid #D2D2D7; background: white; color: #6E6E73; cursor: pointer; transition: all .15s; white-space: nowrap; font-family: inherit; }

  .sort-select { font-size: 12px; padding: 6px 10px; border: 0.5px solid #D2D2D7; border-radius: 8px; background: white; color: #1D1D1F; font-family: inherit; cursor: pointer; }

  /* Store grid */
  .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }

  /* Store card */
  .store-card { background: white; border-radius: 14px; border: 0.5px solid #D2D2D7; overflow: hidden; cursor: pointer; transition: all .2s; }
  .store-card:hover { border-color: #0071E3; box-shadow: 0 4px 20px rgba(0,113,227,0.1); transform: translateY(-1px); }
  .store-card.selected { border-color: #0071E3; border-width: 1.5px; }

  .card-header { padding: 14px 16px 10px; display: flex; justify-content: space-between; align-items: flex-start; }
  .card-store-name { font-size: 13px; font-weight: 600; color: #1D1D1F; line-height: 1.3; flex: 1; padding-right: 8px; }
  .health-badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 10px; white-space: nowrap; letter-spacing: 0.3px; flex-shrink: 0; }
  .hb-strong, .hb-healthy { background: #D1FAE5; color: #065F46; }
  .hb-watch { background: #FEF3C7; color: #92400E; }
  .hb-at-risk { background: #FEE2E2; color: #991B1B; }

  .card-meta { padding: 0 16px 10px; font-size: 11px; color: #6E6E73; }

  .card-signals { padding: 0 16px 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .sig { font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 8px; }
  .sig-red { background: #FEE2E2; color: #991B1B; }
  .sig-amber { background: #FEF3C7; color: #92400E; }
  .sig-green { background: #D1FAE5; color: #065F46; }
  .sig-blue { background: #DBEAFE; color: #1E40AF; }
  .sig-purple { background: #EDE9FE; color: #5B21B6; }
  .sig-gray { background: #F3F4F6; color: #374151; }

  .card-divider { height: 0.5px; background: #F2F2F7; margin: 0 16px; }

  .card-insight { padding: 10px 16px 14px; }
  .insight-label { font-size: 10px; font-weight: 600; color: #6E6E73; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; }
  .insight-text { font-size: 12px; color: #3C3C43; line-height: 1.5; }

  .dp-meta { font-size: 12px; color: #6E6E73; margin-top: 4px; }

  .dp-btn-primary { background: #0071E3; color: white; border-color: #0071E3; }

  .empty-state { text-align: center; padding: 60px 20px; color: #6E6E73; font-size: 14px; }

  }
</style>

// ── State ────────────────────────────────────────────────────────────────────
const analysed = {};   // store_name → analysis result
const loading = new Set();
let activeFilter = 'all';
let selectedStore = null;
let analysisQueue = [];
let analysisRunning = false;

// ── Claude API call ──────────────────────────────────────────────────────────
const SYSTEM = `You are a retail intelligence analyst for TC Acoustic (distributor of Sonos, Marshall, Bowers & Wilkins, LG). Analyse Channel Manager store visit notes and return ONLY valid JSON with no markdown.

Return exactly:
{"stock_status":"green"|"amber"|"red","stock_summary":"1 sentence","stock_skus_at_risk":[],"momentum":"up"|"flat"|"down","momentum_summary":"1 sentence","competitor_threats":[],"competitor_level":"none"|"low"|"high","training_gaps":[],"training_urgency":"none"|"low"|"high","key_insight":"1 actionable sentence for the AM","recommended_action":"1 specific action","staff_relationship":"cold"|"warm"|"strong","overall_health":"at-risk"|"watch"|"healthy"|"strong"}

Rules: stock red=any SKU at 0 or critically low; amber=some low; green=healthy. Competitor threats=only concrete observations. Be specific and direct. If no evidence return [] or "none".`;

async function analyseStore(storeData) {
  const notesText = storeData.notes.map(n => `[${n.date}] ${n.text}`).join('\n\n');
  const prompt = `Store: ${storeData.store}\nCountry: ${storeData.country} | Tier: ${storeData.tier} | Visits: ${storeData.total_visits}\nLast visit: ${storeData.last_visit}\n\n${notesText}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 600,
      system: SYSTEM,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!resp.ok) throw new Error(`API ${resp.status}`);
  const data = await resp.json();
  let text = data.content[0].text.trim();
  if (text.startsWith('```')) { text = text.split('```')[1]; if (text.startsWith('json')) text = text.slice(4); }
  return JSON.parse(text.trim());
}

// ── Analysis queue runner ─────────────────────────────────────────────────────
async function runQueue() {
  if (analysisRunning) return;
  analysisRunning = true;
  while (analysisQueue.length > 0) {
    const storeName = analysisQueue.shift();
    const storeData = STORES_RAW.find(s => s.store === storeName);
    if (!storeData || analysed[storeName]) continue;
    loading.add(storeName);
    renderGrid();
    try {
      const result = await analyseStore(storeData);
      result.store_name = storeName;
      result.country = storeData.country;
      result.tier = storeData.tier;
      result.cm = storeData.cm;
      result.total_visits = storeData.total_visits;
      result.last_visit = storeData.last_visit;
      result.days_ago = storeData.days_ago;
      analysed[storeName] = result;
    } catch(e) {
      analysed[storeName] = {
        store_name: storeName, country: storeData.country, tier: storeData.tier,
        cm: storeData.cm, total_visits: storeData.total_visits, last_visit: storeData.last_visit,
        days_ago: storeData.days_ago, overall_health: 'watch', stock_status: 'amber',
        stock_summary: 'Analysis pending', stock_skus_at_risk: [], momentum: 'flat',
        momentum_summary: 'Analysis pending', competitor_threats: [], competitor_level: 'none',
        training_gaps: [], training_urgency: 'none', key_insight: 'Check raw visit notes',
        recommended_action: 'Review manually', staff_relationship: 'warm'
      };
    }
    loading.delete(storeName);
    renderGrid();
    updateSummary();
    await new Promise(r => setTimeout(r, 300));
  }
  analysisRunning = false;
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function healthBadgeClass(h) {
  return { strong: 'hb-strong', healthy: 'hb-healthy', watch: 'hb-watch', 'at-risk': 'hb-at-risk' }[h] || 'hb-watch';
}
function healthLabel(h) {
  return { strong: 'STRONG', healthy: 'HEALTHY', watch: 'WATCH', 'at-risk': 'AT RISK' }[h] || 'WATCH';
}
function momentumClass(m) {
  return { up: 'mom-up', flat: 'mom-flat', down: 'mom-down' }[m] || 'mom-flat';
}
function momentumIcon(m) {
  return { up: '↑', flat: '→', down: '↓' }[m] || '→';
}

function getSignals(r) {
  const sigs = [];
  if (!r) return sigs;
  if (r.stock_status === 'red') sigs.push(['🔴 Stock critical', 'sig-red']);
  else if (r.stock_status === 'amber') sigs.push(['🟡 Stock watch', 'sig-amber']);
  if (r.competitor_level === 'high') sigs.push(['⚡⚡ Competitor', 'sig-purple']);
  else if (r.competitor_level === 'low') sigs.push(['⚡ Competitor', 'sig-purple']);
  if (r.training_urgency === 'high') sigs.push(['📚 Training urgent', 'sig-blue']);
  else if (r.training_urgency === 'low') sigs.push(['📚 Training', 'sig-blue']);
  if (r.momentum === 'up') sigs.push(['📈 Momentum up', 'sig-green']);
  else if (r.momentum === 'down') sigs.push(['📉 Declining', 'sig-red']);
  return sigs;
}

function sortOrder(h) {
  return { 'at-risk': 0, watch: 1, healthy: 2, strong: 3 }[h] ?? 1;
}

function getDisplayStores() {
  const searchVal = document.getElementById('search-input').value.toLowerCase();
  const sortVal = document.getElementById('sort-select').value;

  let stores = STORES_RAW.filter(s => {
    if (searchVal && !s.store.toLowerCase().includes(searchVal)) return false;
    if (activeFilter === 'all') return true;
    const r = analysed[s.store];
    if (!r) return true; // show unanalysed in all views
    if (activeFilter === 'at-risk') return r.overall_health === 'at-risk';
    if (activeFilter === 'watch') return r.overall_health === 'watch';
    if (activeFilter === 'healthy') return r.overall_health === 'healthy' || r.overall_health === 'strong';
    if (activeFilter === 'training') return r.training_urgency !== 'none';
    if (activeFilter === 'competitor') return r.competitor_level !== 'none';
    return true;
  });

  stores.sort((a, b) => {
    const ra = analysed[a.store], rb = analysed[b.store];
    if (sortVal === 'risk') {
      const ha = ra ? sortOrder(ra.overall_health) : 1;
      const hb = rb ? sortOrder(rb.overall_health) : 1;
      if (ha !== hb) return ha - hb;
      return a.days_ago - b.days_ago;
    }
    if (sortVal === 'recent') return a.days_ago - b.days_ago;
    if (sortVal === 'stale') return b.days_ago - a.days_ago;
    if (sortVal === 'alpha') return a.store.localeCompare(b.store);
    return 0;
  });

  return stores;
}

function renderGrid() {
  const stores = getDisplayStores();
  const grid = document.getElementById('store-grid');
  const empty = document.getElementById('empty-state');

  if (stores.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = stores.map(s => {
    const r = analysed[s.store];
    const isLoading = loading.has(s.store);
    const isSelected = selectedStore === s.store;

    if (isLoading) {
      return `<div class="store-card ${isSelected?'selected':''}">
        <div class="card-header"><span class="card-store-name">${s.store}</span></div>
        <div class="card-meta">${s.country} · ${s.tier} · ${s.total_visits} visit${s.total_visits !== 1?'s':''}</div>
        <div class="card-loading"><div class="spinner"></div><span class="loading-text">Analysing visit notes…</span></div>
      </div>`;
    }

    if (!r) {
      return `<div class="store-card ${isSelected?'selected':''}" onclick="selectStore('${s.store.replace(/'/g,"\\'")}')" >
        <div class="card-header"><span class="card-store-name">${s.store}</span><span class="health-badge hb-watch" style="opacity:0.4">—</span></div>
        <div class="card-meta">${s.country} · ${s.tier} · ${s.total_visits} visit${s.total_visits!==1?'s':''} · Last: ${s.last_visit}</div>
        <div class="card-loading" style="color:var(--color-text-tertiary);padding:10px 16px 14px;font-size:12px;color:#6E6E73">Queued for analysis…</div>
      </div>`;
    }

    const sigs = getSignals(r);
    const momClass = momentumClass(r.momentum);
    const momIcon = momentumIcon(r.momentum);

    return `<div class="store-card ${isSelected?'selected':''}" onclick="selectStore('${s.store.replace(/'/g,"\\'")}')" >
      <div class="card-header">
        <span class="card-store-name">${s.store}</span>
        <span class="health-badge ${healthBadgeClass(r.overall_health)}">${healthLabel(r.overall_health)}</span>
      </div>
      <div class="card-meta">${r.country} · ${r.tier} · ${r.total_visits} visit${r.total_visits!==1?'s':''} · Last: ${r.last_visit}</div>
      ${sigs.length ? `<div class="card-signals">${sigs.map(([l,c])=>`<span class="sig ${c}">${l}</span>`).join('')}</div>` : ''}
      <div class="card-divider"></div>
      <div class="card-insight">
        <div class="insight-label">Key insight</div>
        <div class="insight-text"><span class="${momClass}">${momIcon}</span> ${r.key_insight}</div>
      </div>
    </div>`;
  }).join('');
}

function updateSummary() {
  const results = Object.values(analysed);
  const risk = results.filter(r => r.overall_health === 'at-risk').length;
  const watch = results.filter(r => r.overall_health === 'watch').length;
  const healthy = results.filter(r => r.overall_health === 'healthy' || r.overall_health === 'strong').length;

  document.getElementById('s-risk').textContent = risk || '—';
  document.getElementById('s-watch').textContent = watch || '—';
  document.getElementById('s-healthy').textContent = healthy || '—';
  document.getElementById('s-analysed').textContent = results.length;

  const alertBadge = document.getElementById('alert-badge');
  if (risk > 0) {
    alertBadge.style.display = 'block';
    alertBadge.textContent = `${risk} at risk`;
  }
}

// ── Filters ───────────────────────────────────────────────────────────────────
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

function applyFilters() { renderGrid(); }

// ── Detail panel ──────────────────────────────────────────────────────────────
function selectStore(name) {
  selectedStore = name;
  const r = analysed[name];
  const raw = STORES_RAW.find(s => s.store === name);

  document.getElementById('dp-store-name').textContent = name;
  document.getElementById('dp-meta').textContent = `${raw.country} · ${raw.tier} · CM: ${raw.cm} · ${raw.total_visits} visits · Last: ${raw.last_visit}`;

  const body = document.getElementById('dp-body');
  const actions = document.getElementById('dp-actions');

  if (!r || loading.has(name)) {
    body.innerHTML = `<div style="padding:20px;text-align:center;color:#6E6E73;font-size:13px">Analysing…</div>`;
    actions.innerHTML = '';
  } else {
    const momIcon = momentumIcon(r.momentum);
    const momClass = momentumClass(r.momentum);

    body.innerHTML = `
      <div class="dp-highlight">
        <div class="label">Key insight</div>
        <div class="value">${r.key_insight}</div>
      </div>
      <div class="dp-highlight">
        <div class="label">Recommended action</div>
        <div class="value"><strong>${r.recommended_action}</strong></div>
      </div>

      <div class="dp-section">
        <div class="dp-section-title">Sales momentum</div>
        <div class="dp-item"><span class="${momClass}">${momIcon} ${r.momentum.toUpperCase()}</span> — ${r.momentum_summary}</div>
      </div>

      <div class="dp-section">
        <div class="dp-section-title">Stock health — ${r.stock_status.toUpperCase()}</div>
        <div class="dp-item">${r.stock_summary}</div>
        ${r.stock_skus_at_risk.length ? r.stock_skus_at_risk.map(sku => `<div class="dp-item" style="color:#991B1B">⚠ ${sku}</div>`).join('') : '<div class="dp-item empty">No SKUs flagged at risk</div>'}
      </div>

      <div class="dp-section">
        <div class="dp-section-title">Competitor activity — ${r.competitor_level.toUpperCase()}</div>
        ${r.competitor_threats.length ? r.competitor_threats.map(t => `<div class="dp-item">⚡ ${t}</div>`).join('') : '<div class="dp-item empty">No competitor threats flagged</div>'}
      </div>

      <div class="dp-section">
        <div class="dp-section-title">Training gaps — ${r.training_urgency.toUpperCase()}</div>
        ${r.training_gaps.length ? r.training_gaps.map(g => `<div class="dp-item">📚 ${g}</div>`).join('') : '<div class="dp-item empty">No training gaps flagged</div>'}
      </div>

      <div class="dp-section">
        <div class="dp-section-title">Recent visit notes</div>
        ${raw.notes.slice(-3).reverse().map(n => `<div class="dp-item"><strong>${n.date}</strong><br><span style="white-space:pre-line;color:#3C3C43">${n.text.slice(0,300)}${n.text.length>300?'…':''}</span></div>`).join('')}
      </div>
    `;

    actions.innerHTML = `
      <button class="dp-btn dp-btn-primary" onclick="copyBrief('${name.replace(/'/g,"\\'")}')">📋 Copy pre-call brief</button>
      <button class="dp-btn" onclick="copyInsights('${name.replace(/'/g,"\\'")}')">Copy key insights</button>
    `;
  }

  document.getElementById('detail-overlay').classList.add('open');
  renderGrid();
}

function closeDetail(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetailPanel();
}
function closeDetailPanel() {
  selectedStore = null;
  document.getElementById('detail-overlay').classList.remove('open');
  renderGrid();
}

function copyBrief(name) {
  const r = analysed[name];
  if (!r) return;
  const momIcon = momentumIcon(r.momentum);
  const text = `PRE-CALL BRIEF — ${name}
Generated: ${new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})}
CM: ${r.cm} | Last visit: ${r.last_visit} | ${r.total_visits} visits on record

OVERALL: ${r.overall_health.toUpperCase()}

KEY INSIGHT
${r.key_insight}

RECOMMENDED ACTION
${r.recommended_action}

SALES MOMENTUM: ${momIcon} ${r.momentum.toUpperCase()}
${r.momentum_summary}

STOCK: ${r.stock_status.toUpperCase()}
${r.stock_summary}
${r.stock_skus_at_risk.length ? 'At risk: ' + r.stock_skus_at_risk.join(', ') : ''}

COMPETITOR ACTIVITY: ${r.competitor_level.toUpperCase()}
${r.competitor_threats.length ? r.competitor_threats.join('\n') : 'None flagged'}

TRAINING GAPS: ${r.training_urgency.toUpperCase()}
${r.training_gaps.length ? r.training_gaps.join('\n') : 'None flagged'}`.trim();

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.dp-btn-primary');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function copyInsights(name) {
  const r = analysed[name];
  if (!r) return;
  const text = `${name}: ${r.key_insight} → ${r.recommended_action}`;
  navigator.clipboard.writeText(text).then(() => {
    const btns = document.querySelectorAll('.dp-btn');
    if (btns[1]) { const orig = btns[1].textContent; btns[1].textContent = '✓ Copied!'; setTimeout(() => btns[1].textContent = orig, 2000); }
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  renderGrid();
  updateSummary();
  // Queue all stores for analysis
  analysisQueue = STORES_RAW.map(s => s.store);
  runQueue();
}

init();
</script>
</body>
</html>
